networks:
  news-media-network:
    name: news-media-network
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: news-media-crawler-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: news-media
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - news-media-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d news-media"]
      interval: 5s
      timeout: 5s
      retries: 5

  news-media-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
    container_name: news-media-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/news-media?sslmode=disable
      - NODE_ENV=production
      - COOKIE_SECURE=false
      - CRAWL_API_URL=${CRAWL_API_URL}
      - CRAWL_STOP_API_URL=${CRAWL_STOP_API_URL}
      - JWT_SECRET=${JWT_SECRET}
      - XPOZ_API_KEY=${XPOZ_API_KEY}
      - GENERATE_CONTENT_API=${GENERATE_CONTENT_API}
      - SITE_URL=${SITE_URL}
      - NEXT_PUBLIC_TRANSCRIPT_API_URL=${NEXT_PUBLIC_TRANSCRIPT_API_URL}
      - YOUTUBE_API_V3_KEY=${YOUTUBE_API_V3_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SUPADATA_API_KEY=${SUPADATA_API_KEY}
      - APP_AWS_ACCESS_KEY=${APP_AWS_ACCESS_KEY}
      - APP_AWS_SECRET_ACCESS_KEY=${APP_AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - APIFY_API_TOKEN=${APIFY_API_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_IMAGE_QUALITY=${OPENAI_IMAGE_QUALITY}
    networks:
      - news-media-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
